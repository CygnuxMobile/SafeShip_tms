name: safeship
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  get_storage: ^2.1.1
  http: ^1.6.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  dio: ^5.9.2
  permission_handler: ^12.0.1
  flutter_svg: ^2.2.4
  flutter_screenutil: ^5.9.3
  mobile_scanner: ^7.2.0
  webview_flutter: ^4.13.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  logger: ^2.5.0
  fluttertoast: ^8.2.10
  package_info_plus: ^10.0.0
  url_launcher: ^6.3.2
  http_parser: ^4.1.2
  sqflite: ^2.4.2
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  dropdown_search: ^7.0.0
  flutter_blue_classic: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/images/upload.png
    - assets/images/view.png
    - assets/images/view_pod.png
    - assets/images/undelivered.png
    - assets/images/safe_ship_logo.png
    - assets/images/login_btn_icon.png
    - assets/images/username.png
    - assets/images/password.png
